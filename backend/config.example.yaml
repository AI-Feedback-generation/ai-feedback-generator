# AI Feedback Generator Configuration
# Copy this file to config.yaml and customize as needed

# Feedback Layer (LLM)
feedback_layer:
    llm_provider: openai # openai, anthropic, development (no LLM calls, for testing)
    llm_model: gpt-4o-mini # e.g., gpt-4o, gpt-4o-mini, claude-sonnet-4-5
    llm_api_key: null # Set via OPENAI_API_KEY env var or here: sk-...
    max_feedback_items: 1
    max_message_length: 200
    enable_cache: true
    cache_ttl_seconds: 300.0
    max_generations_per_minute: 10
    max_tokens: 500
    temperature: 0.3

# Runtime Controller
controller:
    operation_mode: reactive # reactive, proactive
    feedback_cooldown_seconds: 30.0 # Minimum seconds between automatic feedback deliveries
    websocket_host: localhost
    websocket_port: 8765
    api_host: localhost
    api_port: 8080
    log_level: INFO
    log_to_file: true
    log_file_path: logs/ai_feedback_generator.log
